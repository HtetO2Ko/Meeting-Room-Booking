@if (isVisible) {
  <div
    class="fixed top-6 left-1/2 -translate-x-1/2 z-50 w-[28rem] max-w-[90vw] alert-animate"
  >
    <div
      class="bg-slate-900/90 backdrop-blur-xl border border-slate-700/60 rounded-2xl shadow-2xl overflow-hidden"
    >
      <div class="flex items-start p-4">
        <div
          class="flex-shrink-0 w-10 h-10 rounded-xl flex items-center justify-center mr-3 border"
          [class.bg-emerald-500/20]="type === 'success'"
          [class.border-emerald-500/30]="type === 'success'"
          [class.text-emerald-400]="type === 'success'"
          [class.bg-rose-500/20]="type === 'error'"
          [class.border-rose-500/30]="type === 'error'"
          [class.text-rose-400]="type === 'error'"
          [class.bg-amber-500/20]="type === 'warning'"
          [class.border-amber-500/30]="type === 'warning'"
          [class.text-amber-400]="type === 'warning'"
          [class.bg-blue-500/20]="type === 'info'"
          [class.border-blue-500/30]="type === 'info'"
          [class.text-blue-400]="type === 'info'"
        >
          <i
            class="fa-solid"
            [class.fa-circle-check]="type === 'success'"
            [class.fa-circle-xmark]="type === 'error'"
            [class.fa-triangle-exclamation]="type === 'warning'"
            [class.fa-circle-info]="type === 'info'"
          ></i>
        </div>

        <div class="flex-1 min-w-0">
          <div class="flex items-center justify-between mb-1">
            <div class="flex items-baseline gap-2">
              <h3
                class="text-sm font-bold capitalize"
                [class.text-emerald-300]="type === 'success'"
                [class.text-rose-300]="type === 'error'"
                [class.text-amber-300]="type === 'warning'"
                [class.text-blue-300]="type === 'info'"
              >
                {{ type }}
              </h3>
              
            </div>
            <button
              (click)="close()"
              class="text-slate-500 hover:text-slate-300 hover:bg-white/5 p-1 rounded-lg transition duration-200"
            >
              <i class="fa-solid fa-xmark text-sm"></i>
            </button>
          </div>
          <p class="text-sm text-slate-300 leading-relaxed">{{ message }}</p>
        </div>
      </div>
    </div>
  </div>
}

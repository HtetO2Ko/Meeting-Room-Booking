@if (show()) {
  <div class="fixed inset-0 z-50 flex flex-col items-center justify-center bg-slate-950/80 backdrop-blur-sm">

    <div class="relative flex items-center justify-center">
      <div class="w-20 h-20 rounded-full border-4 border-slate-700/50 border-t-indigo-500 animate-spin"></div>
      <div class="absolute w-12 h-12 rounded-full border-4 border-slate-700/30 border-b-violet-400 animate-spin [animation-duration:0.6s] [animation-direction:reverse]"></div>
      <div class="absolute w-3 h-3 rounded-full bg-indigo-400 shadow-lg shadow-indigo-500/60"></div>
    </div>

    <p class="mt-6 text-slate-300 text-sm font-medium tracking-wide animate-pulse">
      {{ message() }}
    </p>

  </div>
}
